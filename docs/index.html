<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #fafafa;
            color: #333;
            padding: 20px;
            line-height: 1.6;
            text-transform: lowercase;
            font-size: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            overflow-x: hidden;
        }

        .login-section {
            max-width: 340px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
        }

        .login-section.hidden {
            display: none;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 18px;
            width: 100%;
        }

        label {
            display: block;
            color: #999;
            margin-bottom: 6px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ddd;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-bottom-color: #333;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fafafa;
            border: none;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 400;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        button:hover {
            background: #555;
        }

        .error {
            color: #c44;
            font-size: 13px;
            margin-top: 12px;
        }

        .files-section {
            display: none;
        }

        .files-section.active {
            display: block;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .welcome-text {
            color: #999;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .logout-btn {
            width: auto;
            padding: 6px 16px;
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            font-size: 14px;
            margin-top: 0;
        }

        .logout-btn:hover {
            color: #333;
            border-color: #333;
            background: transparent;
        }

        .files-list {
            list-style: none;
        }

        .file-item {
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            margin-bottom: 15px;
        }

        .file-name {
            color: #333;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .file-size {
            color: #aaa;
            font-size: 13px;
        }

        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #333;
            color: #fafafa;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .download-btn:hover {
            background: #555;
        }

        .no-files {
            color: #aaa;
            text-align: center;
            padding: 40px 20px;
        }

        a {
            color: #333;
            text-decoration: none;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2px;
            margin-top: 12px;
        }

        .tile-card {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            background: #f0f0f0;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .tile-card:hover {
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.22);
        }

        .tile-preview {
            position: absolute;
            inset: 0;
            background: #f0f0f0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile-preview img,
        .tile-preview iframe,
        .tile-preview video {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
            object-fit: cover;
            background: #f0f0f0;
        }

        .tile-preview iframe {
            pointer-events: none;
        }

        .tile-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.62));
            padding: 22px 8px 7px 8px;
            pointer-events: none;
        }

        .tile-label {
            color: #fff;
            font-size: 13px;
            line-height: 1.3;
            text-align: right;
            word-break: break-word;
        }

        .tile-preview .video-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .tile-preview .video-badge svg {
            width: 20px;
            height: 20px;
            fill: #fff;
            stroke: none;
            margin-left: 2px;
        }

        .tile-preview .audio-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .tile-preview .audio-badge svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tile-preview .audio-bg-icon {
            width: 48px;
            height: 48px;
            fill: none;
            stroke: #ccc;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tile-fallback {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #aaa;
        }

        .tile-fallback svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: #ccc;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .folder-tile .tile-preview {
            background: #f0f0f0;
        }

        .folder-tile .tile-preview svg {
            width: 52px;
            height: 52px;
            fill: none;
            stroke: #aaa;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .action-btn {
            display: inline-block;
            padding: 5px 12px;
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
            color: #999;
            border: 1px solid #ddd;
            background: transparent;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 1px;
            margin-left: 6px;
            width: auto;
            margin-top: 0;
        }

        .action-btn:hover {
            color: #333;
            border-color: #333;
            background: transparent;
        }

        .detail-view {
            display: none;
        }

        .detail-view.active {
            display: block;
        }

        .back-btn {
            width: auto;
            display: inline-block;
            padding: 6px 16px;
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            font-size: 14px;
            margin-bottom: 24px;
            margin-top: 0;
        }

        .back-btn:hover {
            color: #333;
            border-color: #333;
            background: transparent;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .detail-header svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #999;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .detail-name {
            font-size: 18px;
            color: #333;
        }

        .detail-meta {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .preview-area {
            margin: 20px 0;
        }

        .preview-area video,
        .preview-area audio {
            width: 100%;
            max-width: 700px;
        }

        .preview-area img {
            max-width: 700px;
            width: 100%;
        }

        .preview-area iframe {
            width: 100%;
            max-width: 700px;
            height: 500px;
            border: 1px solid #eee;
        }

        .preview-area iframe.audio-frame {
            height: 80px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            background: #f5f5f5;
        }

        .no-preview {
            padding: 40px;
            color: #aaa;
            text-align: center;
        }

        .folder-row {
            cursor: pointer;
        }

        .folder-heading {
            font-size: 14px;
            color: #999;
            letter-spacing: 1px;
            padding: 18px 0 8px 0;
            border-bottom: 1px solid #e0e0e0;
            margin-top: 12px;
        }

        .folder-heading svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: #999;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
            margin-right: 6px;
        }

        .folder-heading span {
            vertical-align: middle;
        }

        .back-folder-btn {
            display: inline-block;
            margin: 10px 0 16px 0;
            font-size: 13px;
            color: #999;
        }

        .back-folder-btn:hover {
            color: #333;
        }

        .detail-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .nav-btn {
            display: inline-block;
            padding: 6px 16px;
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            letter-spacing: 1px;
            width: auto;
            margin-top: 0;
        }

        .nav-btn:hover {
            color: #333;
            border-color: #333;
            background: transparent;
        }

        .nav-btn.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .nav-counter {
            color: #aaa;
            font-size: 12px;
        }

        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }

        .fullscreen-overlay.active {
            display: block;
        }

        .fullscreen-overlay .fs-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 9999;
        }

        .fullscreen-overlay .fs-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .fullscreen-overlay .fs-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fullscreen-overlay .fs-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: auto;
            min-height: 60px;
            flex-wrap: wrap;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
            justify-content: center;
            background: rgba(0,0,0,0.97);
            z-index: 10000;
            box-shadow: 0 -2px 12px 0 rgba(0,0,0,0.5);
            border-top: 2px solid #222;
        }

        .fullscreen-overlay .fs-bar .fs-name {
            color: #ccc;
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 12px;
        }

        .fullscreen-overlay .fs-bar .fs-counter {
            color: #888;
            font-size: 12px;
            margin-right: 12px;
        }

        .fullscreen-overlay .fs-bar button {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 16px;
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            width: auto;
            margin: 0 0 0 8px;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto;
            position: relative;
            z-index: 10001;
        }

        .fullscreen-overlay .fs-bar button:hover {
            color: #fff;
            border-color: #fff;
        }

        .fullscreen-btn {
            display: inline-block;
            padding: 6px 16px;
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            letter-spacing: 1px;
            width: auto;
            margin-top: 0;
            margin-left: 8px;
        }

        .fullscreen-btn:hover {
            color: #333;
            border-color: #333;
        }

        @media (max-width: 700px) {
            body {
                padding: 10px;
                font-size: 14px;
            }

            .container {
                padding: 12px;
            }

            .user-header {
                margin-bottom: 20px;
                padding-bottom: 12px;
            }

            .tiles-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 2px;
            }

            .detail-name {
                font-size: 15px;
                word-break: break-word;
            }

            .detail-header {
                flex-wrap: wrap;
            }

            .preview-area iframe {
                height: 300px;
            }

            .preview-area iframe.audio-frame {
                height: 80px;
            }

            .preview-area img {
                max-width: 100%;
            }

            .download-btn {
                font-size: 12px;
                padding: 8px 14px;
            }

            .fullscreen-overlay .fs-bar {
                height: auto;
                min-height: 60px;
                flex-wrap: wrap;
                padding: 12px 16px;
                padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
                justify-content: center;
            }

            .fullscreen-overlay .fs-content {
                bottom: 100px;
            }

            .fullscreen-overlay .fs-bar .fs-name {
                width: 100%;
                flex: none;
                font-size: 12px;
                margin: 0 0 8px 0;
                text-align: center;
            }

            .fullscreen-overlay .fs-bar .fs-counter {
                font-size: 12px;
                margin: 0 8px 0 0;
                order: -1;
                width: 100%;
                text-align: center;
                margin-bottom: 8px;
            }

            .fullscreen-overlay .fs-bar button {
                padding: 12px 20px;
                font-size: 15px;
                margin: 0 4px;
                flex: 1;
                min-width: 80px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="login-section" id="loginSection">
            <h1>login</h1>
            
            <div class="form-group">
                <label>username</label>
                <input type="text" id="username" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label>password</label>
                <input type="password" id="password" autocomplete="current-password">
            </div>
            
            <button onclick="login()">login</button>
            <div class="error" id="loginError"></div>
        </div>

        <div class="files-section" id="filesSection">
            <div class="user-header">
                <div class="welcome-text"><span id="displayName"></span> file share</div>
                <button class="logout-btn" onclick="logout()">logout</button>
            </div>
            
            <div class="files-list" id="filesGrid"></div>
        </div>

        <div class="detail-view" id="detailView">
            <button class="back-btn" onclick="backToList()">← back</button>
            <div class="detail-header">
                <span id="detailIcon"></span>
                <div class="detail-name" id="detailFileName"></div>
            </div>
            <div class="detail-meta" id="detailFileMeta"></div>
            <div class="preview-area" id="previewArea"></div>
            <a href="#" id="downloadBtn" class="download-btn" download>download</a>
            <div class="detail-nav" id="detailNav">
                <button class="nav-btn" id="prevBtn" onclick="navFile(-1)">← prev</button>
                <span class="nav-counter" id="navCounter"></span>
                <button class="nav-btn" id="nextBtn" onclick="navFile(1)">next →</button>
                <button class="fullscreen-btn" id="fullscreenBtn" onclick="enterFullscreen()">fullscreen</button>
            </div>
        </div>
    </div>

    <div class="fullscreen-overlay" id="fsOverlay">
        <div class="fs-content" id="fsContent"></div>
        <div class="fs-bar">
            <span class="fs-name" id="fsName"></span>
            <span class="fs-counter" id="fsCounter"></span>
            <button id="fsPrev">← prev</button>
            <button id="fsNext">next →</button>
            <button id="fsClose">close</button>
        </div>
    </div>

        function xorDecrypt(b64, key) {
            const raw = atob(b64);
            let out = '';
            for (let i = 0; i < raw.length; i++) {
                out += String.fromCharCode(raw.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return out;
        }

        let currentFiles = [];

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function login() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.textContent = 'please enter username and password';
                return;
            }

            if (!(username in USER_HASHES)) {
                errorDiv.textContent = 'invalid username or password';
                return;
            }

            const passwordHash = await sha256(password);
            if (passwordHash !== USER_HASHES[username]) {
                errorDiv.textContent = 'invalid username or password';
                return;
            }

            // Decrypt file data using the password hash
            const enc = USER_FILES_ENC[username] || '';
            let decrypted = [];
            if (enc) {
                try {
                    decrypted = JSON.parse(xorDecrypt(enc, passwordHash));
                } catch(e) {
                    errorDiv.textContent = 'error decrypting files';
                    return;
                }
            }
            sessionStorage.setItem('userFiles', JSON.stringify(decrypted));
            sessionStorage.setItem('username', username);
            sessionStorage.setItem('displayName', username.charAt(0).toUpperCase() + username.slice(1));
            showFiles();
        }

        function logout() {
            sessionStorage.clear();
            currentFiles = [];
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('filesSection').classList.remove('active');
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').textContent = '';
        }

        function showFiles() {
            const username = sessionStorage.getItem('username');
            if (!username) return;

            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('filesSection').classList.add('active');
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('displayName').textContent = sessionStorage.getItem('displayName');

            try {
                currentFiles = JSON.parse(sessionStorage.getItem('userFiles') || '[]');
            } catch(e) {
                currentFiles = [];
            }
            currentView = 'root';
            currentFolder = '';
            renderFileList();
        }

            }
            if (f.category === 'pdf') {
                return '<iframe src="https://drive.google.com/file/d/' + f.id + '/preview"></iframe>';
            }
            if (f.category === 'audio') {
                return '<span class="audio-badge"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></span>';
            }
            if (f.category === 'video') {
                return '<img src="https://drive.google.com/thumbnail?id=' + f.id + '&sz=w720" alt="' + f.name + '" loading="lazy"><span class="video-badge"><svg viewBox="0 0 24 24"><polygon points="8,6 19,12 8,18"></polygon></svg></span>';
            }
            if (googleNativeTypes.includes(f.category)) {
                const embedBase = f.category === 'gsheet' ? 'https://docs.google.com/spreadsheets/d/' : f.category === 'gslides' ? 'https://docs.google.com/presentation/d/' : f.category === 'gdoc' ? 'https://docs.google.com/document/d/' : f.category === 'gform' ? 'https://docs.google.com/forms/d/' : 'https://docs.google.com/drawings/d/';
                return '<iframe src="' + embedBase + f.id + '/preview"></iframe>';
            }
            return '<div class="tile-fallback">' + fileIcon(f.category) + '<span>' + catLabel(f.category) + '</span></div>';
        }

        function renderFileList() {
            const grid = document.getElementById('filesGrid');
            if (!currentFiles.length) {
                grid.innerHTML = '<p class="no-files">no files available</p>';
                return;
            }

            const prefix = currentFolder ? currentFolder + '/' : '';

            // Files directly at this level
            levelFiles = currentFolder
                ? currentFiles.filter(f => f.folder === currentFolder)
                : currentFiles.filter(f => !f.folder);

            // Subfolders at this level
            const subfolderSet = new Set();
            currentFiles.forEach(f => {
                if (!f.folder) return;
                if (currentFolder) {
                    if (f.folder.startsWith(prefix) && f.folder !== currentFolder) {
                        const rest = f.folder.slice(prefix.length);
                        const next = rest.split('/')[0];
                        if (next) subfolderSet.add(next);
                    }
                } else {
                    subfolderSet.add(f.folder.split('/')[0]);
                }
            });
            const subfolders = [...subfolderSet].sort();
            folderNames = subfolders;

            let html = '';

            // Back button + heading when inside a folder
            if (currentFolder) {
                html += '<div class="folder-heading">' + folderSvg + '<span>' + currentFolder + '</span></div>';
                html += '<a class="action-btn back-folder-btn" href="#" onclick="event.preventDefault();goBack()">← back</a>';
            }

            if (subfolders.length || levelFiles.length) {
                html += '<div class="tiles-grid">';
            }

            // Render subfolders
            subfolders.forEach((name, fi) => {
                const fullPath = currentFolder ? currentFolder + '/' + name : name;
                const count = currentFiles.filter(f => f.folder && (f.folder === fullPath || f.folder.startsWith(fullPath + '/'))).length;
                html += '<div class="tile-card folder-tile" onclick="openFolder(' + fi + ')">';
                html += '<div class="tile-preview">' + folderSvg + '</div>';
                html += '<div class="tile-overlay"><div class="tile-label">' + name + '</div></div>';
                html += '</div>';
            });

            // Render files at this level
            levelFiles.forEach((f, i) => {
                const gi = currentFiles.indexOf(f);
                html += '<div class="tile-card file-tile" onclick="openFileDetail(' + gi + ',' + i + ')">';
                html += '<div class="tile-preview">' + tilePreviewHtml(f) + '</div>';
                html += '<div class="tile-overlay"><div class="tile-label">' + f.name + '</div></div>';
                html += '</div>';
            });

            if (subfolders.length || levelFiles.length) {
                html += '</div>';
            }

            if (!subfolders.length && !levelFiles.length) {
                html += '<p class="no-files">' + (currentFolder ? 'no files in this folder' : 'no files available') + '</p>';
            }
            grid.innerHTML = html;
        }

        function openFolder(idx) {
            const name = folderNames[idx];
            if (!name) return;
            currentFolder = currentFolder ? currentFolder + '/' + name : name;
            currentView = 'folder';
            history.pushState({view: 'folder', folder: currentFolder}, '');
            renderFileList();
        }

        function goBack() {
            if (!currentFolder) return;
            const parts = currentFolder.split('/');
            parts.pop();
            currentFolder = parts.join('/');
            currentView = currentFolder ? 'folder' : 'root';
            history.pushState({view: currentView, folder: currentFolder}, '');
            renderFileList();
        }

        let currentIndex = -1;
        let navContext = 'none';

        function openFileDetail(globalIdx, levelIdx) {
            if (currentFolder && levelFiles.length > 1) {
                navContext = 'folder';
                currentIndex = levelIdx;
            } else {
                navContext = 'none';
            }
            showDetail(currentFiles[globalIdx]);
        }

        function showDetail(file) {
            if (!file) return;
            history.pushState({view: 'detail'}, '');

            document.getElementById('filesSection').classList.remove('active');
            const detail = document.getElementById('detailView');
            detail.classList.add('active');

            document.getElementById('detailFileName').textContent = file.name;
            document.getElementById('detailIcon').innerHTML = fileIcon(file.category);
            const folderLabel = file.folder ? file.folder + ' · ' : '';
            document.getElementById('detailFileMeta').textContent = folderLabel + catLabel(file.category) + ' · ' + file.size;

            const preview = document.getElementById('previewArea');
            const isNative = googleNativeTypes.includes(file.category);
            const dlLink = downloadUrl(file);

            if (isNative) {
                const embedBase = file.category === 'gsheet' ? 'https://docs.google.com/spreadsheets/d/' : file.category === 'gslides' ? 'https://docs.google.com/presentation/d/' : file.category === 'gdoc' ? 'https://docs.google.com/document/d/' : file.category === 'gform' ? 'https://docs.google.com/forms/d/' : 'https://docs.google.com/drawings/d/';
                preview.innerHTML = '<iframe src="' + embedBase + file.id + '/preview"></iframe>';
            } else if (file.category === 'video') {
                preview.innerHTML = '<iframe src="https://drive.google.com/file/d/' + file.id + '/preview" allow="autoplay; fullscreen" allowfullscreen></iframe>';
            } else if (file.category === 'audio') {
                preview.innerHTML = '<iframe class="audio-frame" src="https://drive.google.com/file/d/' + file.id + '/preview"></iframe>';
            } else if (file.category === 'image') {
                preview.innerHTML = '<img src="https://lh3.googleusercontent.com/d/' + file.id + '" alt="' + file.name + '" loading="lazy">';
            } else if (file.category === 'pdf') {
                preview.innerHTML = '<iframe src="https://drive.google.com/file/d/' + file.id + '/preview"></iframe>';
            } else {
                preview.innerHTML = '<div class="no-preview">preview not available</div>';
            }

            document.getElementById('downloadBtn').href = dlLink;
            document.getElementById('downloadBtn').textContent = isNative ? 'download as pdf' : 'download';

            // Show/hide prev/next nav
            const nav = document.getElementById('detailNav');
            if (navContext === 'folder' && levelFiles.length > 1) {
                nav.style.display = 'flex';
                document.getElementById('prevBtn').classList.toggle('disabled', currentIndex <= 0);
                document.getElementById('nextBtn').classList.toggle('disabled', currentIndex >= levelFiles.length - 1);
                document.getElementById('navCounter').textContent = (currentIndex + 1) + ' / ' + levelFiles.length;
            } else {
                nav.style.display = 'none';
            }
        }

        function navFile(delta) {
            const newIndex = currentIndex + delta;
            if (newIndex >= 0 && newIndex < levelFiles.length) {
                currentIndex = newIndex;
                showDetail(levelFiles[newIndex]);
            }
        }

        function stopMedia() {
            document.getElementById('previewArea').innerHTML = '';
        }

        function backToList() {
            stopMedia();
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('filesSection').classList.add('active');
            if (currentView === 'folder') {
                renderFileList();
            }
        }

        // Fullscreen mode
        let fsActive = false;

        function getFsHtml(file) {
            if (!file) return '';
            const isNative = googleNativeTypes.includes(file.category);
            if (file.category === 'image') {
                return '<img src="https://lh3.googleusercontent.com/d/' + file.id + '" alt="' + file.name + '">';
            } else if (isNative) {
                const embedBase = file.category === 'gsheet' ? 'https://docs.google.com/spreadsheets/d/' : file.category === 'gslides' ? 'https://docs.google.com/presentation/d/' : file.category === 'gdoc' ? 'https://docs.google.com/document/d/' : file.category === 'gform' ? 'https://docs.google.com/forms/d/' : 'https://docs.google.com/drawings/d/';
                return '<iframe src="' + embedBase + file.id + '/preview"></iframe>';
            } else if (file.category === 'video') {
                return '<iframe src="https://drive.google.com/file/d/' + file.id + '/preview" allow="autoplay; fullscreen" allowfullscreen></iframe>';
            } else if (file.category === 'pdf') {
                return '<iframe src="https://drive.google.com/file/d/' + file.id + '/preview"></iframe>';
            }
            return '';
        }

        function updateFs() {
            const file = levelFiles[currentIndex];
            if (!file) return;
            document.getElementById('fsContent').innerHTML = getFsHtml(file);
            document.getElementById('fsName').textContent = file.name;
            document.getElementById('fsCounter').textContent = (currentIndex + 1) + ' / ' + levelFiles.length;
            document.getElementById('fsPrev').style.display = currentIndex <= 0 ? 'none' : '';
            document.getElementById('fsNext').style.display = currentIndex >= levelFiles.length - 1 ? 'none' : '';
        }

        function enterFullscreen() {
            if (navContext !== 'folder' || levelFiles.length < 1) return;
            fsActive = true;
            updateFs();
            document.getElementById('fsOverlay').classList.add('active');
        }

        function exitFullscreen() {
            fsActive = false;
            document.getElementById('fsOverlay').classList.remove('active');
            // Sync detail view with current index
            showDetail(levelFiles[currentIndex]);
        }

        function fsNav(delta) {
            const newIndex = currentIndex + delta;
            if (newIndex >= 0 && newIndex < levelFiles.length) {
                currentIndex = newIndex;
                updateFs();
            }
        }

        // Attach fullscreen button handlers
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('fsPrev').addEventListener('click', function(e) {
                e.stopPropagation();
                fsNav(-1);
            });
            document.getElementById('fsNext').addEventListener('click', function(e) {
                e.stopPropagation();
                fsNav(1);
            });
            document.getElementById('fsClose').addEventListener('click', function(e) {
                e.stopPropagation();
                exitFullscreen();
            });
        });

        document.addEventListener('keydown', function(e) {
            if (!fsActive) return;
            if (e.key === 'Escape') {
                exitFullscreen();
            } else if (e.key === 'ArrowLeft') {
                fsNav(-1);
            } else if (e.key === 'ArrowRight') {
                fsNav(1);
            }
        });

        window.addEventListener('popstate', function(e) {
            const detail = document.getElementById('detailView');
            if (fsActive) {
                exitFullscreen();
                return;
            }
            if (detail.classList.contains('active')) {
                stopMedia();
                detail.classList.remove('active');
                document.getElementById('filesSection').classList.add('active');
                renderFileList();
            } else if (e.state && e.state.view === 'folder') {
                currentView = 'folder';
                currentFolder = e.state.folder || '';
                renderFileList();
            } else {
                currentView = 'root';
                currentFolder = '';
                renderFileList();
            }
        });

        if (sessionStorage.getItem('username')) {
            showFiles();
        }

        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
